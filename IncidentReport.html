<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incident Reports</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f7fa;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    thead {
      background: #42a5f5;
      color: white;
    }

    th, td {
      padding: 12px 15px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    tbody tr:hover {
      background: #f1f1f1;
    }

    .no-data {
      text-align: center;
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h2>Recent Incident Reports</h2>
  <table>
    <thead>
      <tr>
        <th>Type</th>
        <th>Description</th>
        <th>Location</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="incidentTableBody">
      <tr><td colspan="4" class="no-data">Loading...</td></tr>
    </tbody>
  </table>

  <script type="module">
    // Import Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDOaqfyMNW96fIeFxvXdZgzrnQ-bDZPgbU",
      authDomain: "camshield-50aec.firebaseapp.com",
      projectId: "camshield-50aec",
      storageBucket: "camshield-50aec.firebasestorage.app", 
      messagingSenderId: "655472977777",
      appId: "1:655472977777:web:907fe040370301c08b78d0",
      measurementId: "G-W4N2BLCEL3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadIncidents() {
      const tbody = document.getElementById("incidentTableBody");
      tbody.innerHTML = `<tr><td colspan="4" class="no-data">Loading...</td></tr>`;

      try {
        // Get recent incidents (latest 10)
        const q = query(collection(db, "incidentReports"), orderBy("timestamp", "desc"), limit(10));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          tbody.innerHTML = `<tr><td colspan="4" class="no-data">No incidents found</td></tr>`;
          return;
        }

        tbody.innerHTML = "";
        querySnapshot.forEach(doc => {
          const data = doc.data();
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${data.type || "N/A"}</td>
            <td>${data.description || "N/A"}</td>
            <td>${data.location || "N/A"}</td>
            <td>${data.timestamp?.toDate ? data.timestamp.toDate().toLocaleString() : "N/A"}</td>
          `;
          tbody.appendChild(row);
        });

      } catch (error) {
        console.error("Error loading incidents:", error);
        tbody.innerHTML = `<tr><td colspan="4" class="no-data">Error loading data</td></tr>`;
      }
    }

    loadIncidents();
  </script>
</body>
</html>
